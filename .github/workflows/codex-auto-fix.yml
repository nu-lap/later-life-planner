name: Codex Auto-Fix on Failure

on:
  workflow_run:
    workflows: ["CI/CD"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  auto-fix:
    concurrency:
      group: codex-auto-fix
      cancel-in-progress: true
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    env:
      FAILED_WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
      FAILED_RUN_URL: ${{ github.event.workflow_run.html_url }}
      FAILED_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
      FAILED_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout failing ref
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.FAILED_HEAD_SHA }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm i; fi

      - name: Install jq
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Install Codex CLI
        shell: bash
        run: |
          set -euo pipefail
          npm install -g @openai/codex

      - name: Prepare CODEX_HOME
        shell: bash
        env:
          CODEX_HOME: ${{ runner.temp }}/.codex
        run: |
          set -euo pipefail
          mkdir -p "$CODEX_HOME"
          chmod 700 "$CODEX_HOME"
          cat > "$CODEX_HOME/config.toml" <<'EOF'
          cli_auth_credentials_store = "file"
          EOF

      - name: Authenticate to Azure via OIDC
        uses: azure/cli@v1
        with:
          inlineScript: |
            set -euo pipefail
            TOKEN_URL="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange"
            apt-get update >/dev/null
            apt-get install -y jq >/dev/null
            ID_RESPONSE="$(curl -sSf -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$TOKEN_URL")"
            ID_TOKEN="$(printf '%s' "$ID_RESPONSE" | jq -r '.value')"
            az login \
              --service-principal \
              --username "${{ secrets.CODEX_SP_APPLICATION_ID }}" \
              --tenant "${{ secrets.CODEX_SP_TENANT_ID }}" \
              --federated-token "$ID_TOKEN"
            az account set --subscription "${{ secrets.CODEX_SP_SUBSCRIPTION_ID }}"

      - name: Restore auth.json from Azure Key Vault
        shell: bash
        env:
          CODEX_HOME: ${{ runner.temp }}/.codex
          KEYVAULT_NAME: ${{ secrets.AZURE_KEYVAULT_NAME }}
          KEYVAULT_SECRET_NAME: codex-auth-json
        run: |
          set -euo pipefail
          az keyvault secret show \
            --vault-name "$KEYVAULT_NAME" \
            --name "$KEYVAULT_SECRET_NAME" \
            --query value \
            --output tsv > "$CODEX_HOME/auth.json"
          chmod 600 "$CODEX_HOME/auth.json"

      - name: Run Codex auto-fix
        shell: bash
        env:
          CODEX_HOME: ${{ runner.temp }}/.codex
          CODEX_AUTO_FIX_MODEL: ${{ vars.CODEX_AUTO_FIX_MODEL || 'gpt-5.2-codex' }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          codex exec \
            --model "$CODEX_AUTO_FIX_MODEL" \
            --sandbox workspace-write \
            --json "Review this Next.js repository, identify what is broken by reading the test files and source files under src/. Apply the minimal change to one or more files under src/ that fixes the failing tests. Do not modify any file under tests/ or docs/."
          if git diff --quiet; then
            echo "::error::Codex made no changes to the workspace — cannot create a fix PR." >&2
            exit 1
          fi

      - name: Verify tests
        run: npm test --silent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Create pull request with fixes
        if: success()
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          commit-message: "fix(ci): auto-fix failing tests via Codex"
          branch: codex/auto-fix-${{ github.event.workflow_run.id }}
          base: ${{ env.FAILED_HEAD_BRANCH }}
          title: "Auto-fix failing CI via Codex"
          body: |
            Codex automatically generated this PR in response to a CI failure on workflow `${{ env.FAILED_WORKFLOW_NAME }}`.
            Failed run: ${{ env.FAILED_RUN_URL }}
            Head branch: `${{ env.FAILED_HEAD_BRANCH }}`
            This PR contains minimal changes intended solely to make the CI pass.
