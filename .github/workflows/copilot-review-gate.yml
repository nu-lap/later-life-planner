name: Copilot Review Gate

on:
  pull_request:
    branches: [master]
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed
  pull_request_review_comment:
    types:
      - edited
      - deleted

concurrency:
  group: copilot-review-gate-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  copilot-gate:
    if: >-
      github.event.pull_request.base.ref == 'master' &&
      github.event.pull_request.draft == false &&
      (
        github.event_name == 'pull_request' ||
        github.event_name == 'pull_request_review' ||
        github.event_name == 'pull_request_review_comment'
      )
    runs-on: ubuntu-latest
    outputs:
      head_sha: ${{ steps.context.outputs.head_sha }}
      target_sha: ${{ steps.context.outputs.target_sha }}
      copilot_activity_count: ${{ steps.scan.outputs.target_activity_count }}
      copilot_pending_count: ${{ steps.scan.outputs.target_pending_count }}
      lifecycle_state: ${{ steps.scan.outputs.lifecycle_state }}
      blocker_count: ${{ steps.scan.outputs.blocker_count }}

    steps:
      # Load PR head metadata once so lifecycle/scan logic always evaluates
      # the current commit window consistently across all event types.
      - name: Load PR head context
        id: context
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.issue.number;
            const eventName = context.eventName;
            const action = context.payload.action || "";
            const beforeShaRaw = context.payload.before || "";
            const beforeSha = String(beforeShaRaw).trim();

            const pr = await github.rest.pulls.get({ owner, repo, pull_number });
            const headSha = pr.data.head.sha;
            let targetSha = headSha;
            let requiresFreshReview = eventName === "pull_request";
            const bypassEnabled = (pr.data.labels || []).some(
              (label) => (label.name || "").toLowerCase() === "copilot-gate-bypass"
            );

            if (
              eventName === "pull_request" &&
              action === "synchronize" &&
              /^[0-9a-f]{40}$/i.test(beforeSha)
            ) {
              try {
                const comparison = await github.rest.repos.compareCommitsWithBasehead({
                  owner,
                  repo,
                  basehead: `${beforeSha}...${headSha}`
                });
                const changedFiles = Array.isArray(comparison.data.files)
                  ? comparison.data.files.length
                  : 0;
                if (changedFiles === 0) {
                  targetSha = beforeSha;
                  requiresFreshReview = false;
                  core.info(
                    `No file changes detected for synchronize event (${beforeSha}...${headSha}). ` +
                    `Reusing previous reviewed SHA ${targetSha}.`
                  );
                }
              } catch (error) {
                core.warning(
                  `Unable to compare ${beforeSha}...${headSha}; requiring fresh Copilot review. ` +
                  `Error: ${error.message || String(error)}`
                );
              }
            }

            core.setOutput("head_sha", headSha);
            core.setOutput("target_sha", targetSha);
            core.setOutput("requires_fresh_review", String(requiresFreshReview));
            core.setOutput("bypass_enabled", String(bypassEnabled));

            if (bypassEnabled) {
              core.info("Bypass label 'copilot-gate-bypass' found; skipping gate enforcement.");
            }

      # Inspect Copilot lifecycle and findings for the resolved target SHA.
      # This is event-driven and deterministic (no polling loops).
      - name: Scan Copilot review comments
        if: ${{ steps.context.outputs.bypass_enabled != 'true' }}
        id: scan
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          TARGET_SHA: ${{ steps.context.outputs.target_sha }}
          HEAD_SHA: ${{ steps.context.outputs.head_sha }}
          REQUIRES_FRESH_REVIEW: ${{ steps.context.outputs.requires_fresh_review }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.issue.number;
            const targetSha = process.env.TARGET_SHA;
            const headSha = process.env.HEAD_SHA;
            const requiresFreshReview = process.env.REQUIRES_FRESH_REVIEW === "true";
            const copilotUsers = new Set([
              "github-copilot",
              "copilot",
              "copilot-pull-request-reviewer[bot]"
            ]);

            const termRules = [
              {
                term: "security",
                match: /\bsecurity\b/i,
                negations: [/\bno security issues?\b/i, /\bno known security\b/i]
              },
              { term: "unsafe", match: /\bunsafe\b/i, negations: [/\bnot unsafe\b/i] },
              { term: "injection", match: /\binjection\b/i, negations: [/\bno injection\b/i] },
              { term: "race", match: /\brace\b/i, negations: [/\bno race(?: conditions?)?\b/i] },
              {
                term: "critical",
                match: /\bcritical\b/i,
                negations: [/\bnot critical\b/i, /\bnon[-\s]?critical\b/i]
              },
              {
                term: "undefined behavior",
                match: /\bundefined behavior\b/i,
                negations: [/\bno undefined behavior\b/i]
              }
            ];

            if (!targetSha) {
              core.setFailed("Missing target SHA for Copilot scan.");
              return;
            }

            const normalizeLogin = (login) => String(login || "").toLowerCase();
            const isCopilotUser = (login) => copilotUsers.has(normalizeLogin(login));

            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              { owner, repo, pull_number, per_page: 100 }
            );

            const reviewComments = await github.paginate(
              github.rest.pulls.listReviewComments,
              { owner, repo, pull_number, per_page: 100 }
            );

            const copilotReviews = reviews.filter((review) => {
              const author = normalizeLogin(review.user?.login);
              return (
                isCopilotUser(author) &&
                review.commit_id === targetSha &&
                (review.state || "").toUpperCase() !== "PENDING"
              );
            });
            const pendingCopilotReviews = reviews.filter((review) => {
              const author = normalizeLogin(review.user?.login);
              return (
                isCopilotUser(author) &&
                review.commit_id === targetSha &&
                (review.state || "").toUpperCase() === "PENDING"
              );
            });
            const copilotComments = reviewComments.filter((comment) => {
              const author = normalizeLogin(comment.user?.login);
              return (
                isCopilotUser(author) &&
                (comment.commit_id === targetSha || comment.original_commit_id === targetSha)
              );
            });

            const analyzableItems = [
              ...copilotReviews
                .filter((review) => (review.body || "").trim().length > 0)
                .map((review) => ({ kind: "review", body: review.body || "", url: review.html_url })),
              ...copilotComments.map((comment) => ({
                kind: "comment",
                body: comment.body || "",
                url: comment.html_url
              }))
            ];

            const findBlockingTerms = (text) => {
              const blockers = [];
              for (const rule of termRules) {
                if (!rule.match.test(text)) {
                  continue;
                }
                const negated = rule.negations.some((pattern) => pattern.test(text));
                if (!negated) {
                  blockers.push(rule.term);
                }
              }
              return blockers;
            };

            const blockingItems = analyzableItems
              .map((item) => ({ ...item, blockingTerms: findBlockingTerms(item.body) }))
              .filter((item) => item.blockingTerms.length > 0);

            const reviewCount = copilotReviews.length;
            const commentCount = copilotComments.length;
            const pendingCount = pendingCopilotReviews.length;
            const activityCount = reviewCount + commentCount;

            const issueEvents = await github.paginate(
              github.rest.issues.listEvents,
              { owner, repo, issue_number: pull_number, per_page: 100 }
            );
            const reviewRequestedEvents = issueEvents.filter((event) => {
              return (
                event.event === "review_requested" &&
                normalizeLogin(event.requested_reviewer?.login) === "copilot"
              );
            });
            const workStartedEvents = issueEvents.filter(
              (event) => event.event === "copilot_work_started"
            );
            const latestTimestamp = (events) => {
              if (events.length === 0) {
                return null;
              }
              return events
                .map((event) => event.created_at || "")
                .filter((value) => value.length > 0)
                .sort()
                .at(-1) || null;
            };
            const latestReviewRequestedAt = latestTimestamp(reviewRequestedEvents);
            const latestWorkStartedAt = latestTimestamp(workStartedEvents);

            let lifecycleState = "not_requested";
            if (latestReviewRequestedAt) {
              lifecycleState = "review_requested";
            }
            if (
              latestWorkStartedAt &&
              (!latestReviewRequestedAt || Date.parse(latestWorkStartedAt) >= Date.parse(latestReviewRequestedAt))
            ) {
              lifecycleState = "copilot_work_started";
            }
            if (pendingCount > 0) {
              lifecycleState = "copilot_review_pending";
            }
            if (activityCount > 0 && pendingCount === 0) {
              lifecycleState = "copilot_review_completed";
            }

            core.setOutput("blocker_count", String(blockingItems.length));
            core.setOutput("target_pending_count", String(pendingCount));
            core.setOutput("target_activity_count", String(activityCount));
            core.setOutput("lifecycle_state", lifecycleState);
            core.info(`Review comments scanned: ${reviewComments.length}`);
            core.info(`Reviews scanned: ${reviews.length}`);
            core.info(`Head SHA: ${headSha}`);
            core.info(`Copilot reviews found on target SHA ${targetSha}: ${reviewCount}`);
            core.info(`Copilot comments found on target SHA ${targetSha}: ${commentCount}`);
            core.info(`Copilot pending reviews on target SHA ${targetSha}: ${pendingCount}`);
            core.info(`Copilot lifecycle state: ${lifecycleState}`);
            core.info(`Requires fresh review: ${requiresFreshReview}`);
            core.info(`Blocking Copilot items: ${blockingItems.length}`);

            for (const item of blockingItems) {
              core.info(
                `Blocking ${item.kind} URL: ${item.url} terms=${item.blockingTerms.join(",")}`
              );
            }

      # Enforce deterministic lifecycle:
      # 1) no pending Copilot review for target SHA
      # 2) target SHA has Copilot review artifacts
      # 3) no blocking Copilot findings
      - name: Enforce Copilot review gate
        if: ${{ steps.context.outputs.bypass_enabled != 'true' && github.event_name != 'pull_request' }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          BLOCKER_COUNT: ${{ steps.scan.outputs.blocker_count }}
          TARGET_PENDING_COUNT: ${{ steps.scan.outputs.target_pending_count }}
          TARGET_ACTIVITY_COUNT: ${{ steps.scan.outputs.target_activity_count }}
          LIFECYCLE_STATE: ${{ steps.scan.outputs.lifecycle_state }}
          TARGET_SHA: ${{ steps.context.outputs.target_sha }}
          HEAD_SHA: ${{ steps.context.outputs.head_sha }}
          REQUIRES_FRESH_REVIEW: ${{ steps.context.outputs.requires_fresh_review }}
        with:
          script: |
            const blockers = Number(process.env.BLOCKER_COUNT || "0");
            const pending = Number(process.env.TARGET_PENDING_COUNT || "0");
            const activity = Number(process.env.TARGET_ACTIVITY_COUNT || "0");
            const lifecycle = process.env.LIFECYCLE_STATE || "unknown";
            const targetSha = process.env.TARGET_SHA || "<missing>";
            const headSha = process.env.HEAD_SHA || "<missing>";
            const requiresFreshReview = process.env.REQUIRES_FRESH_REVIEW === "true";

            if (pending > 0) {
              core.setFailed(
                `Copilot Review Gate pending: Copilot review is still in progress ` +
                `for target SHA ${targetSha} (head ${headSha}).`
              );
              return;
            }

            if (activity === 0) {
              const awaitingMessageByState = {
                not_requested: "Copilot review has not been requested yet.",
                review_requested: "Copilot review was requested but has not started.",
                copilot_work_started: "Copilot review has started but has not published artifacts yet."
              };
              const stateMessage = awaitingMessageByState[lifecycle] ||
                "Copilot review artifacts are not yet available.";
              const freshnessMessage = requiresFreshReview
                ? "A fresh Copilot review is required for this PR head."
                : "This run reuses a previous target SHA (no file changes detected), but no matching Copilot artifacts were found.";
              core.setFailed(
                `Copilot Review Gate awaiting review: ${stateMessage} ${freshnessMessage} ` +
                `target=${targetSha} head=${headSha}`
              );
              return;
            }

            if (blockers > 0) {
              core.setFailed(
                `Copilot Review Gate failed: ${blockers} blocking Copilot review comment(s) found.`
              );
            } else {
              core.info(
                `Copilot Review Gate passed: lifecycle=${lifecycle}, target=${targetSha}, ` +
                `activity=${activity}, blockers=${blockers}.`
              );
            }

      # Pull request events can arrive before Copilot publishes review artifacts.
      # Keep these runs non-failing and allow review-driven events to enforce.
      - name: Report Copilot gate await state on pull_request
        if: ${{ steps.context.outputs.bypass_enabled != 'true' && github.event_name == 'pull_request' }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          TARGET_PENDING_COUNT: ${{ steps.scan.outputs.target_pending_count }}
          TARGET_ACTIVITY_COUNT: ${{ steps.scan.outputs.target_activity_count }}
          LIFECYCLE_STATE: ${{ steps.scan.outputs.lifecycle_state }}
          TARGET_SHA: ${{ steps.context.outputs.target_sha }}
          HEAD_SHA: ${{ steps.context.outputs.head_sha }}
        with:
          script: |
            const pending = Number(process.env.TARGET_PENDING_COUNT || "0");
            const activity = Number(process.env.TARGET_ACTIVITY_COUNT || "0");
            const lifecycle = process.env.LIFECYCLE_STATE || "unknown";
            const targetSha = process.env.TARGET_SHA || "<missing>";
            const headSha = process.env.HEAD_SHA || "<missing>";

            if (pending > 0 || activity === 0) {
              core.notice(
                `Awaiting Copilot review artifacts on pull_request event ` +
                `(lifecycle=${lifecycle}, pending=${pending}, activity=${activity}, ` +
                `target=${targetSha}, head=${headSha}). ` +
                `Enforcement runs on review-driven events.`
              );
            } else {
              core.info(
                `Copilot artifacts already available on pull_request event ` +
                `(lifecycle=${lifecycle}, activity=${activity}, target=${targetSha}).`
              );
            }
