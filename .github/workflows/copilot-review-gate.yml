name: Copilot Review Gate

on:
  pull_request:
    branches: [master]
    types:
      - opened
      - synchronize
      - reopened
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed
  pull_request_review_comment:
    types:
      - created
      - edited
      - deleted

concurrency:
  group: copilot-review-gate-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  copilot-gate:
    if: >-
      github.event.pull_request.base.ref == 'master' &&
      (
        github.event_name == 'pull_request' ||
        (
          github.event_name == 'pull_request_review' &&
          contains(fromJson('["copilot","Copilot","github-copilot","copilot-pull-request-reviewer[bot]"]'), github.actor)
        ) ||
        (
          github.event_name == 'pull_request_review_comment' &&
          contains(fromJson('["copilot","Copilot","github-copilot","copilot-pull-request-reviewer[bot]"]'), github.actor)
        )
      )
    runs-on: ubuntu-latest
    outputs:
      head_sha: ${{ steps.wait.outputs.head_sha }}
      head_window_start_iso: ${{ steps.wait.outputs.head_window_start_iso }}
      copilot_activity_count: ${{ steps.wait.outputs.copilot_activity_count }}
      blocker_count: ${{ steps.scan.outputs.blocker_count }}

    steps:
      # Wait for Copilot-authored review activity before evaluating blockers.
      # This prevents an early pass before Copilot has had a chance to review.
      - name: Wait for Copilot review activity
        id: wait
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.issue.number;
            const pollIntervalMs = 15 * 1000;
            const timeoutMs = 10 * 60 * 1000;
            const deadline = Date.now() + timeoutMs;
            const copilotUsers = new Set([
              "github-copilot",
              "copilot",
              "copilot-pull-request-reviewer[bot]"
            ]);

            const pr = await github.rest.pulls.get({ owner, repo, pull_number });
            const headSha = pr.data.head.sha;
            const headCommit = await github.rest.repos.getCommit({
              owner,
              repo,
              ref: headSha
            });
            const headCommitTimeMs = Date.parse(headCommit.data.commit.committer.date);
            // Allow slight clock skew between review event timestamps and commit timestamp.
            const windowStartMs = headCommitTimeMs - 60 * 1000;
            const windowStartIso = new Date(windowStartMs).toISOString();
            core.setOutput("head_sha", headSha);
            core.setOutput("head_window_start_iso", windowStartIso);

            const inspectCopilotActivityForHead = async () => {
              const reviews = await github.paginate(
                github.rest.pulls.listReviews,
                { owner, repo, pull_number, per_page: 100 }
              );
              const reviewComments = await github.paginate(
                github.rest.pulls.listReviewComments,
                { owner, repo, pull_number, per_page: 100 }
              );

              const copilotReviewsForHead = reviews.filter((review) => {
                const author = (review.user?.login || "").toLowerCase();
                const submittedAtMs = Date.parse(review.submitted_at || "");
                return (
                  copilotUsers.has(author) &&
                  review.commit_id === headSha &&
                  (!Number.isNaN(submittedAtMs) && submittedAtMs >= windowStartMs)
                );
              });
              const copilotCommentsForHead = reviewComments.filter((comment) => {
                const author = (comment.user?.login || "").toLowerCase();
                const createdAtMs = Date.parse(comment.created_at || "");
                return (
                  copilotUsers.has(author) &&
                  (!Number.isNaN(createdAtMs) && createdAtMs >= windowStartMs) &&
                  (comment.commit_id === headSha || comment.original_commit_id === headSha)
                );
              });

              const pendingCount = reviews.filter((review) => {
                const author = (review.user?.login || "").toLowerCase();
                return (
                  copilotUsers.has(author) &&
                  review.commit_id === headSha &&
                  (review.state || "").toUpperCase() === "PENDING"
                );
              }).length;
              const reviewBodyCount = copilotReviewsForHead.filter(
                (review) =>
                  (review.state || "").toUpperCase() !== "PENDING" &&
                  (review.body || "").trim().length > 0
              ).length;

              return {
                pendingCount,
                reviewCount: reviewBodyCount,
                commentCount: copilotCommentsForHead.length,
                totalCount: reviewBodyCount + copilotCommentsForHead.length
              };
            };

            let activityCount = 0;
            let pendingCount = 0;
            while (Date.now() < deadline) {
              const result = await inspectCopilotActivityForHead();
              activityCount = result.totalCount;
              pendingCount = result.pendingCount;

              if (activityCount > 0 && pendingCount === 0) {
                break;
              }
              core.info(
                `Waiting for Copilot review completion on head ${headSha} since ${windowStartIso}. ` +
                `activity=${activityCount}, pending=${pendingCount}`
              );
              await new Promise((resolve) => setTimeout(resolve, pollIntervalMs));
            }

            if (activityCount === 0 || pendingCount > 0) {
              core.setFailed(
                `Timed out waiting for completed Copilot review on head ${headSha}. ` +
                `activity=${activityCount}, pending=${pendingCount}`
              );
              return;
            }

            core.setOutput("copilot_activity_count", String(activityCount));
            core.info(`Copilot activity count: ${activityCount}`);

      # Read review comments from the pull request and count blocking findings
      # authored by the github-copilot account.
      - name: Scan Copilot review comments
        id: scan
        uses: actions/github-script@v7
        env:
          HEAD_SHA: ${{ steps.wait.outputs.head_sha }}
          HEAD_WINDOW_START_ISO: ${{ steps.wait.outputs.head_window_start_iso }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.issue.number;
            const headSha = process.env.HEAD_SHA;
            const windowStartMs = Date.parse(process.env.HEAD_WINDOW_START_ISO || "");
            const copilotUsers = new Set([
              "github-copilot",
              "copilot",
              "copilot-pull-request-reviewer[bot]"
            ]);

            const termRules = [
              {
                term: "security",
                match: /\bsecurity\b/i,
                negations: [/\bno security issues?\b/i, /\bno known security\b/i]
              },
              { term: "unsafe", match: /\bunsafe\b/i, negations: [/\bnot unsafe\b/i] },
              { term: "injection", match: /\binjection\b/i, negations: [/\bno injection\b/i] },
              { term: "race", match: /\brace\b/i, negations: [/\bno race(?: conditions?)?\b/i] },
              {
                term: "critical",
                match: /\bcritical\b/i,
                negations: [/\bnot critical\b/i, /\bnon[-\s]?critical\b/i]
              },
              {
                term: "undefined behavior",
                match: /\bundefined behavior\b/i,
                negations: [/\bno undefined behavior\b/i]
              }
            ];

            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              { owner, repo, pull_number, per_page: 100 }
            );

            const reviewComments = await github.paginate(
              github.rest.pulls.listReviewComments,
              { owner, repo, pull_number, per_page: 100 }
            );

            const copilotReviews = reviews.filter((review) => {
              const author = (review.user?.login || "").toLowerCase();
              const submittedAtMs = Date.parse(review.submitted_at || "");
              return (
                copilotUsers.has(author) &&
                review.commit_id === headSha &&
                (!Number.isNaN(submittedAtMs) && submittedAtMs >= windowStartMs) &&
                (review.state || "").toUpperCase() !== "PENDING"
              );
            });
            const copilotComments = reviewComments.filter((comment) => {
              const author = (comment.user?.login || "").toLowerCase();
              const createdAtMs = Date.parse(comment.created_at || "");
              return (
                copilotUsers.has(author) &&
                (!Number.isNaN(createdAtMs) && createdAtMs >= windowStartMs) &&
                (comment.commit_id === headSha || comment.original_commit_id === headSha)
              );
            });

            const analyzableItems = [
              ...copilotReviews
                .filter((review) => (review.body || "").trim().length > 0)
                .map((review) => ({ kind: "review", body: review.body || "", url: review.html_url })),
              ...copilotComments.map((comment) => ({
                kind: "comment",
                body: comment.body || "",
                url: comment.html_url
              }))
            ];

            const findBlockingTerms = (text) => {
              const blockers = [];
              for (const rule of termRules) {
                if (!rule.match.test(text)) {
                  continue;
                }
                const negated = rule.negations.some((pattern) => pattern.test(text));
                if (!negated) {
                  blockers.push(rule.term);
                }
              }
              return blockers;
            };

            const blockingItems = analyzableItems
              .map((item) => ({ ...item, blockingTerms: findBlockingTerms(item.body) }))
              .filter((item) => item.blockingTerms.length > 0);

            const reviewCount = copilotReviews.length;
            const commentCount = copilotComments.length;

            core.setOutput("blocker_count", String(blockingItems.length));
            core.info(`Review comments scanned: ${reviewComments.length}`);
            core.info(`Reviews scanned: ${reviews.length}`);
            core.info(`Head review window starts: ${process.env.HEAD_WINDOW_START_ISO}`);
            core.info(`Copilot reviews found on head ${headSha}: ${reviewCount}`);
            core.info(`Copilot comments found on head ${headSha}: ${commentCount}`);
            core.info(`Blocking Copilot items: ${blockingItems.length}`);

            for (const item of blockingItems) {
              core.info(
                `Blocking ${item.kind} URL: ${item.url} terms=${item.blockingTerms.join(",")}`
              );
            }

      # Fail the job when any blocking Copilot comment exists.
      - name: Enforce Copilot review gate
        uses: actions/github-script@v7
        env:
          BLOCKER_COUNT: ${{ steps.scan.outputs.blocker_count }}
        with:
          script: |
            const blockers = Number(process.env.BLOCKER_COUNT || "0");
            if (blockers > 0) {
              core.setFailed(
                `Copilot Review Gate failed: ${blockers} blocking Copilot review comment(s) found.`
              );
            } else {
              core.info("Copilot Review Gate passed: no blocking Copilot review comments found.");
            }
