name: Codex PR Review

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  actions: read
  contents: read
  pull-requests: read

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    permissions:
      contents: read
    outputs:
      verdict: ${{ steps.extract.outputs.verdict }}
      summary: ${{ steps.extract.outputs.summary }}
      findings_count: ${{ steps.extract.outputs.findings_count }}
      first_finding: ${{ steps.extract.outputs.first_finding }}
      findings_digest: ${{ steps.extract.outputs.findings_digest }}
      comment_body: ${{ steps.comment.outputs.body }}
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout pull request head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base branch
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install jq
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Install Codex CLI
        shell: bash
        run: |
          set -euo pipefail
          npm install -g @openai/codex

      - name: Prepare CODEX_HOME
        shell: bash
        env:
          CODEX_HOME: ${{ runner.temp }}/.codex
        run: |
          set -euo pipefail
          mkdir -p "$CODEX_HOME"
          chmod 700 "$CODEX_HOME"
          cat > "$CODEX_HOME/config.toml" <<'EOF'
          cli_auth_credentials_store = "file"
          EOF

      - name: Azure login via Codex credential
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0 — current official release still runs on Node 20; update when Azure ships a Node 24 build
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_CODEX_KV }}

      - name: Restore auth.json from Azure Key Vault
        shell: bash
        env:
          CODEX_HOME: ${{ runner.temp }}/.codex
          KEYVAULT_NAME: ${{ secrets.AZURE_KEYVAULT_NAME }}
          KEYVAULT_SECRET_NAME: codex-auth-json
        run: |
          set -euo pipefail
          az keyvault secret show \
            --vault-name "$KEYVAULT_NAME" \
            --name "$KEYVAULT_SECRET_NAME" \
            --query value \
            --output tsv > "$CODEX_HOME/auth.json"
          chmod 600 "$CODEX_HOME/auth.json"

      - name: Prepare review schema
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          cat > codex-review-schema.json <<'EOF'
          {
            "type": "object",
            "additionalProperties": false,
            "required": ["verdict", "summary", "findings", "residual_risks"],
            "properties": {
              "verdict": {
                "type": "string",
                "enum": ["pass", "rework_required", "review_error"]
              },
              "summary": {
                "type": "string",
                "minLength": 1
              },
              "findings": {
                "type": "array",
                "items": {
                  "type": "object",
                  "additionalProperties": false,
                  "required": ["severity", "title", "details", "file", "line"],
                  "properties": {
                    "severity": {
                      "type": "string",
                      "enum": ["critical", "high", "medium", "low"]
                    },
                    "title": {
                      "type": "string",
                      "minLength": 1
                    },
                    "details": {
                      "type": "string",
                      "minLength": 1
                    },
                    "file": {
                      "type": ["string", "null"]
                    },
                    "line": {
                      "type": ["integer", "null"],
                      "minimum": 1
                    }
                  }
                }
              },
              "residual_risks": {
                "type": "array",
                "items": {
                  "type": "string",
                  "minLength": 1
                }
              }
            }
          }
          EOF

      - name: Gather review context
        id: review_context
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          BASE_REF="origin/${{ github.base_ref }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          EVENT_JSON="$GITHUB_EVENT_PATH"

          CHANGED_FILES=$(git diff --name-only "$BASE_REF"..."$HEAD_SHA" || true)
          TOTAL_FILES=$(printf '%s\n' "$CHANGED_FILES" | sed '/^$/d' | wc -l | tr -d ' ')
          DIFF_STATUS=$(git diff --name-status "$BASE_REF"..."$HEAD_SHA" || true)
          ADDED_FILES=$(printf '%s\n' "$DIFF_STATUS" | awk '$1=="A"{c++} END{print c+0}')
          DELETED_FILES=$(printf '%s\n' "$DIFF_STATUS" | awk '$1=="D"{c++} END{print c+0}')
          RENAMED_FILES=$(printf '%s\n' "$DIFF_STATUS" | awk '$1 ~ /^R/{c++} END{print c+0}')
          MODIFIED_FILES=$(printf '%s\n' "$DIFF_STATUS" | awk '$1=="M"{c++} END{print c+0}')

          ADDITIONS=$(git diff --numstat "$BASE_REF"..."$HEAD_SHA" | awk '$1 ~ /^[0-9]+$/ {add+=$1} END{print add+0}')
          DELETIONS=$(git diff --numstat "$BASE_REF"..."$HEAD_SHA" | awk '$2 ~ /^[0-9]+$/ {del+=$2} END{print del+0}')
          TOTAL_CHURN=$((ADDITIONS + DELETIONS))

          DOC_FILES=0
          CODE_FILES=0
          CONFIG_FILES=0
          OTHER_FILES=0

          doc_exts="md mdx txt rst adoc"
          code_exts="ts tsx js jsx py go rb java kt cs cpp c h rs php swift sql"
          config_exts="yml yaml json toml ini env"

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            base=$(basename "$file")
            ext="${file##*.}"
            ext=$(printf '%s' "$ext" | tr '[:upper:]' '[:lower:]')

            if [[ "$file" == docs/* ]] || [[ "$base" == README* ]] || [[ " $doc_exts " == *" $ext "* ]]; then
              DOC_FILES=$((DOC_FILES + 1))
              continue
            fi
            if [[ " $code_exts " == *" $ext "* ]]; then
              CODE_FILES=$((CODE_FILES + 1))
              continue
            fi
            if [[ " $config_exts " == *" $ext "* ]] || [[ "$base" == "Dockerfile" ]] || [[ "$base" == "Makefile" ]] || [[ "$file" == .github/workflows/* ]]; then
              CONFIG_FILES=$((CONFIG_FILES + 1))
              continue
            fi
            OTHER_FILES=$((OTHER_FILES + 1))
          done <<< "$CHANGED_FILES"

          DOC_ONLY="false"
          if [ "$TOTAL_FILES" -gt 0 ] && [ "$CODE_FILES" -eq 0 ] && [ "$CONFIG_FILES" -eq 0 ] && [ "$OTHER_FILES" -eq 0 ]; then
            DOC_ONLY="true"
          fi

          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          git ls-tree -r --name-only "$BASE_REF" > "$tmpdir/base_files.txt" || true
          printf '%s\n' "$CHANGED_FILES" > "$tmpdir/changed_files.txt"

          extract_exts() {
            local input=$1
            while IFS= read -r file; do
              [ -z "$file" ] && continue
              base=$(basename "$file")
              ext=""
              if [[ "$base" == .* && "$base" != *.* ]]; then
                ext=""
              else
                ext="${base##*.}"
                if [ "$ext" = "$base" ]; then
                  ext=""
                fi
              fi
              if [ -n "$ext" ]; then
                printf '%s\n' "$ext"
              fi
            done < "$input" | tr '[:upper:]' '[:lower:]' | sort -u
          }

          extract_exts "$tmpdir/base_files.txt" > "$tmpdir/base_exts.txt"
          extract_exts "$tmpdir/changed_files.txt" > "$tmpdir/changed_exts.txt"
          NEW_EXTS=$(comm -13 "$tmpdir/base_exts.txt" "$tmpdir/changed_exts.txt" | tr '\n' ',' | sed 's/,$//')

          DEP_FILES_CHANGED=$(printf '%s\n' "$CHANGED_FILES" | grep -E -c '(^package.json$|^package-lock.json$|^pnpm-lock.yaml$|^yarn.lock$|^requirements.txt$|^pyproject.toml$|^poetry.lock$|^go.mod$|^Cargo.toml$|^Gemfile$)' || true)
          ADDED_DEPS=""
          if printf '%s\n' "$CHANGED_FILES" | grep -qx "package.json" && [ -f package.json ]; then
            git show "$BASE_REF:package.json" > "$tmpdir/base_package.json" 2>/dev/null || echo '{}' > "$tmpdir/base_package.json"
            cp package.json "$tmpdir/head_package.json"
            jq -r '(.dependencies // {}) + (.devDependencies // {}) + (.peerDependencies // {}) + (.optionalDependencies // {}) | keys[]' \
              "$tmpdir/base_package.json" | sort -u > "$tmpdir/base_deps.txt" || true
            jq -r '(.dependencies // {}) + (.devDependencies // {}) + (.peerDependencies // {}) + (.optionalDependencies // {}) | keys[]' \
              "$tmpdir/head_package.json" | sort -u > "$tmpdir/head_deps.txt" || true
            ADDED_DEPS=$(comm -13 "$tmpdir/base_deps.txt" "$tmpdir/head_deps.txt" | tr '\n' ',' | sed 's/,$//')
          fi

          AUTHOR_LOGIN=$(jq -r '.pull_request.user.login // ""' "$EVENT_JSON")
          AUTHOR_ASSOC=$(jq -r '.pull_request.author_association // ""' "$EVENT_JSON")
          FIRST_TIME_CONTRIB=$(jq -r '.pull_request.author_association == "FIRST_TIME_CONTRIBUTOR"' "$EVENT_JSON")

          PR_COUNT_TOTAL="unknown"
          PR_COUNT_MERGED="unknown"
          PR_COUNT_RECENT="unknown"
          if [ -n "${GITHUB_TOKEN:-}" ] && [ -n "$AUTHOR_LOGIN" ]; then
            API_BASE="https://api.github.com/search/issues"
            QUERY_TOTAL="repo:${GITHUB_REPOSITORY} type:pr author:${AUTHOR_LOGIN}"
            QUERY_MERGED="repo:${GITHUB_REPOSITORY} type:pr author:${AUTHOR_LOGIN} is:merged"
            RECENT_DATE=$(date -u -d '180 days ago' +%F)
            QUERY_RECENT="repo:${GITHUB_REPOSITORY} type:pr author:${AUTHOR_LOGIN} merged:>=${RECENT_DATE}"

            api_count() {
              local query=$1
              local response
              response=$(curl -sS -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" \
                "${API_BASE}?q=$(printf '%s' "$query" | sed 's/ /+/g')") || return 1
              printf '%s' "$response" | jq -r '.total_count // empty'
            }

            PR_COUNT_TOTAL=$(api_count "$QUERY_TOTAL" || echo "unknown")
            PR_COUNT_MERGED=$(api_count "$QUERY_MERGED" || echo "unknown")
            PR_COUNT_RECENT=$(api_count "$QUERY_RECENT" || echo "unknown")
          fi

          SCORE=0
          if [ "$TOTAL_CHURN" -gt 800 ]; then SCORE=$((SCORE + 2)); elif [ "$TOTAL_CHURN" -gt 200 ]; then SCORE=$((SCORE + 1)); fi
          if [ "$CODE_FILES" -gt 10 ]; then SCORE=$((SCORE + 2)); elif [ "$CODE_FILES" -gt 3 ]; then SCORE=$((SCORE + 1)); fi
          if [ -n "$NEW_EXTS" ]; then SCORE=$((SCORE + 2)); fi
          if [ -n "$ADDED_DEPS" ]; then SCORE=$((SCORE + 2)); fi
          if [ "$DELETED_FILES" -gt 5 ]; then SCORE=$((SCORE + 1)); fi
          if [ "$FIRST_TIME_CONTRIB" = "true" ]; then SCORE=$((SCORE + 2)); fi
          if [ "$PR_COUNT_MERGED" = "0" ]; then SCORE=$((SCORE + 2)); fi
          if [ "$DOC_ONLY" = "true" ]; then SCORE=$((SCORE - 2)); fi
          if [ "$SCORE" -lt 0 ]; then SCORE=0; fi

          REVIEW_LEVEL="standard"
          if [ "$SCORE" -le 1 ]; then REVIEW_LEVEL="light"; fi
          if [ "$SCORE" -ge 5 ]; then REVIEW_LEVEL="deep"; fi

          cat > review-context.json <<EOF
          {
            "pr_number": ${{ github.event.pull_request.number }},
            "base_ref": "${{ github.base_ref }}",
            "head_sha": "${{ github.event.pull_request.head.sha }}",
            "files_changed": $TOTAL_FILES,
            "files_added": $ADDED_FILES,
            "files_deleted": $DELETED_FILES,
            "files_renamed": $RENAMED_FILES,
            "files_modified": $MODIFIED_FILES,
            "lines_added": $ADDITIONS,
            "lines_deleted": $DELETIONS,
            "total_churn": $TOTAL_CHURN,
            "doc_files": $DOC_FILES,
            "code_files": $CODE_FILES,
            "config_files": $CONFIG_FILES,
            "other_files": $OTHER_FILES,
            "doc_only": $DOC_ONLY,
            "new_extensions": "${NEW_EXTS}",
            "dependency_files_changed": $DEP_FILES_CHANGED,
            "added_dependencies": "${ADDED_DEPS}",
            "author": {
              "login": "${AUTHOR_LOGIN}",
              "association": "${AUTHOR_ASSOC}",
              "first_time_contributor": $FIRST_TIME_CONTRIB,
              "prior_prs_total": "${PR_COUNT_TOTAL}",
              "prior_prs_merged": "${PR_COUNT_MERGED}",
              "prior_prs_recent_180d": "${PR_COUNT_RECENT}"
            },
            "review_level_suggestion": "${REVIEW_LEVEL}"
          }
          EOF

      - name: Prepare review prompt
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          cat > codex-review-prompt.md <<EOF
          Review pull request #${{ github.event.pull_request.number }} for the Later Life Planner repository against origin/${{ github.base_ref }}.

          Return only a JSON object that matches the provided schema.

          Determine the appropriate review depth (light, standard, deep) using the provided review context. Your summary must begin with "Review level: <level>.".
          Use these factors when selecting depth: nature of changes (docs vs code), complexity and churn, number of new/deleted files, introduction of new libraries, introduction of new languages, potential coding style shifts, and author experience/history. If a factor is unknown, treat it as unknown; do not assume.

          Verdict rules:
          - Use "pass" when there are no material issues that require developer re-work before merge.
          - Use "rework_required" when one or more material issues require developer changes before merge.
          - Use "review_error" only when you cannot complete the review from the available repository state.

          Review rules:
          - Prioritise bugs, behavioural regressions, security issues, deployment or workflow breakage, and missing tests.
          - Ignore style-only suggestions and avoid praise.
          - Findings must be ordered by severity.
          - Include only findings that should block or meaningfully delay merge.
          - Use concise, developer-readable titles and details.
          - Include file and line only when you can point to a specific location.
          - If verdict is "pass", findings must be empty.
          - If verdict is "rework_required", findings must not be empty.
          - Residual risks should list brief verification gaps or follow-up concerns.

          Review context (authoritative):
          \`\`\`json
          $(cat review-context.json)
          \`\`\`
          EOF

      - name: Run Codex review
        shell: bash
        env:
          CODEX_HOME: ${{ runner.temp }}/.codex
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          codex exec \
            --ephemeral \
            --full-auto \
            --output-schema codex-review-schema.json \
            -o codex-review.json \
            - < codex-review-prompt.md
          if ! jq -e '
            (.verdict | IN("pass", "rework_required", "review_error")) and
            (.summary | type == "string" and length > 0) and
            (.findings | type == "array") and
            (.residual_risks | type == "array") and
            (if .verdict == "pass" then (.findings | length == 0)
             elif .verdict == "rework_required" then (.findings | length > 0)
             else true end)
          ' codex-review.json > /dev/null; then
            echo "::error::Codex review output is missing the required structured verdict." >&2
            exit 1
          fi

      - name: Extract review verdict
        id: extract
        shell: bash
        run: |
          set -euo pipefail
          emit_output() {
            local key=$1
            local value=$2
            local delimiter
            delimiter="EOF_$(uuidgen | tr '[:upper:]' '[:lower:]')"
            {
              echo "${key}<<${delimiter}"
              echo "$value"
              echo "${delimiter}"
            } >> "$GITHUB_OUTPUT"
          }

          VERDICT=$(jq -r '.verdict' codex-review.json)
          SUMMARY=$(jq -r '.summary' codex-review.json)
          FINDINGS_COUNT=$(jq -r '.findings | length' codex-review.json)
          FIRST_FINDING=$(jq -r '
            def oneline: gsub("[[:space:]]+"; " ") | sub("^ "; "") | sub(" $"; "");
            if (.findings | length) > 0 then
              "[\(.findings[0].severity)] \(.findings[0].title | oneline)"
            else
              ""
            end
          ' codex-review.json)
          FINDINGS_DIGEST=$(jq -r '
            def oneline: gsub("[[:space:]]+"; " ") | sub("^ "; "") | sub(" $"; "");
            [.findings[0:3][] | "[\(.severity)] \(.title | oneline)"] | join(" | ")
          ' codex-review.json)

          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "findings_count=$FINDINGS_COUNT" >> "$GITHUB_OUTPUT"
          emit_output "summary" "$SUMMARY"
          emit_output "first_finding" "$FIRST_FINDING"
          emit_output "findings_digest" "$FINDINGS_DIGEST"

      - name: Render review markdown
        shell: bash
        run: |
          set -euo pipefail
          jq -r '
            def location:
              if (.file // "") == "" then ""
              elif (.line // 0) > 0 then " (`\(.file):\(.line)`)"
              else " (`\(.file)`)"
              end;
            def findings_block:
              if (.findings | length) == 0 then
                "### Findings\n\nNo findings."
              else
                "### Findings\n\n" + (
                  .findings |
                  map("- [\(.severity | ascii_upcase)] \(.title)\((. | location))\n  \(.details)") |
                  join("\n")
                )
              end;
            def residual_block:
              if (.residual_risks | length) == 0 then
                ""
              else
                "\n\n### Residual Risks\n\n" + (
                  .residual_risks |
                  map("- " + .) |
                  join("\n")
                )
              end;
            "## Codex PR Review\n\n- Verdict: `\(.verdict)`\n- Summary: \(.summary)\n\n" +
            findings_block +
            residual_block + "\n"
          ' codex-review.json > codex-review-summary.md

          {
            echo '<!-- codex-pr-review -->'
            cat codex-review-summary.md
          } > codex-review-comment.md

      - name: Capture review comment
        id: comment
        shell: bash
        run: |
          set -euo pipefail
          emit_output() {
            local key=$1
            local value=$2
            local delimiter
            delimiter="EOF_$(uuidgen | tr '[:upper:]' '[:lower:]')"
            {
              echo "${key}<<${delimiter}"
              echo "$value"
              echo "${delimiter}"
            } >> "$GITHUB_OUTPUT"
          }

          emit_output "body" "$(cat codex-review-comment.md)"

      - name: Add job summary
        shell: bash
        run: |
          set -euo pipefail
          cat codex-review-summary.md >> "$GITHUB_STEP_SUMMARY"

  # Isolate PR-write scope to the comment publisher so the secret-backed review job stays read-only.
  publish-review-comment:
    needs: review
    if: |
      needs.review.result == 'success' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    permissions:
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Publish PR comment
        shell: bash
        env:
          COMMENT_BODY: ${{ needs.review.outputs.comment_body }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          API_ROOT="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          COMMENTS_POST_URL="${API_ROOT}/issues/${PR_NUMBER}/comments"
          RESPONSE_FILE=$(mktemp)
          trap 'rm -f "$RESPONSE_FILE"' EXIT

          github_api() {
            local method=$1
            local url=$2
            local data_file=${3-}
            local status

            if [ -n "$data_file" ]; then
              status=$(curl -sS -o "$RESPONSE_FILE" -w '%{http_code}' \
                -X "$method" \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "Content-Type: application/json" \
                "$url" \
                --data @"$data_file")
            else
              status=$(curl -sS -o "$RESPONSE_FILE" -w '%{http_code}' \
                -X "$method" \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "$url")
            fi

            case "$status" in
              200|201)
                cat "$RESPONSE_FILE"
                return 0
                ;;
              403)
                echo "::warning::Skipping PR comment because the workflow token cannot write issue comments for this event (HTTP 403)." >&2
                if [ -s "$RESPONSE_FILE" ]; then
                  head -c 500 "$RESPONSE_FILE" >&2
                  echo >&2
                fi
                return 10
                ;;
              *)
                echo "::warning::Unable to publish Codex PR comment (HTTP $status)." >&2
                if [ -s "$RESPONSE_FILE" ]; then
                  head -c 500 "$RESPONSE_FILE" >&2
                  echo >&2
                fi
                return 11
                ;;
            esac
          }

          printf '%s' "$COMMENT_BODY" > codex-review-comment.md

          COMMENT_ID=""
          for page in 1 2 3 4 5; do
            PAGE_JSON=$(github_api GET "${API_ROOT}/issues/${PR_NUMBER}/comments?per_page=100&page=${page}") || API_STATUS=$?
            if [ "${API_STATUS:-0}" -eq 10 ]; then
              exit 0
            fi
            if [ "${API_STATUS:-0}" -ne 0 ]; then
              exit 0
            fi
            unset API_STATUS
            PAGE_COMMENT_ID=$(printf '%s' "$PAGE_JSON" |
              jq -r '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("<!-- codex-pr-review -->"))) | .id' |
              tail -n 1)
            if [ -n "$PAGE_COMMENT_ID" ]; then
              COMMENT_ID="$PAGE_COMMENT_ID"
            fi
            if [ -n "$COMMENT_ID" ]; then
              break
            fi
          done

          jq -Rs '{body: .}' codex-review-comment.md > codex-review-payload.json

          if [ -n "$COMMENT_ID" ]; then
            github_api PATCH "${API_ROOT}/issues/comments/${COMMENT_ID}" codex-review-payload.json > /dev/null || true
          else
            github_api POST "$COMMENTS_POST_URL" codex-review-payload.json > /dev/null || true
          fi

  review-gate:
    needs: review
    if: ${{ always() }}
    permissions:
      actions: read
    runs-on: ubuntu-latest
    steps:
      - name: Inspect failed review job
        id: inspect
        if: |
          needs.review.result != 'success' &&
          github.event.pull_request.draft == false &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          github.event.pull_request.user.login != 'dependabot[bot]'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          API_ROOT="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          JOBS_JSON=$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${API_ROOT}/actions/runs/${GITHUB_RUN_ID}/jobs?per_page=100")

          REVIEW_JOB_JSON=$(printf '%s' "$JOBS_JSON" |
            jq -c '.jobs[] | select(.name == "review")' |
            tail -n 1)

          if [ -z "$REVIEW_JOB_JSON" ]; then
            exit 0
          fi

          FAILED_STEP=$(printf '%s' "$REVIEW_JOB_JSON" |
            jq -r '[.steps[] | select(.conclusion == "failure") | .name][0] // ""')
          JOB_URL=$(printf '%s' "$REVIEW_JOB_JSON" | jq -r '.html_url // ""')

          if [ -n "$FAILED_STEP" ]; then
            echo "failed_step=$FAILED_STEP" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$JOB_URL" ]; then
            echo "job_url=$JOB_URL" >> "$GITHUB_OUTPUT"
          fi

      - name: Enforce Codex review result
        shell: bash
        env:
          PR_IS_DRAFT: ${{ github.event.pull_request.draft }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
          REVIEW_RESULT: ${{ needs.review.result }}
          REVIEW_VERDICT: ${{ needs.review.outputs.verdict }}
          REVIEW_SUMMARY: ${{ needs.review.outputs.summary }}
          FINDINGS_COUNT: ${{ needs.review.outputs.findings_count }}
          FIRST_FINDING: ${{ needs.review.outputs.first_finding }}
          FINDINGS_DIGEST: ${{ needs.review.outputs.findings_digest }}
          FAILED_STEP: ${{ steps.inspect.outputs.failed_step }}
          JOB_URL: ${{ steps.inspect.outputs.job_url }}
        run: |
          set -euo pipefail

          if [ "$PR_IS_DRAFT" = "true" ]; then
            echo "Draft PR; Codex review will be enforced after ready_for_review."
            exit 0
          fi

          if [ "$HEAD_REPO" != "$BASE_REPO" ]; then
            echo "::error::Codex review is required for merge, but this PR head repo is not trusted for the current secret-backed review workflow." >&2
            exit 1
          fi

          if [ "$PR_AUTHOR" = "dependabot[bot]" ]; then
            echo "::error::Codex review is required for merge, but Dependabot PRs cannot use the current secret-backed review workflow." >&2
            exit 1
          fi

          if [ "$REVIEW_RESULT" != "success" ]; then
            SUMMARY="Codex review ended with result: $REVIEW_RESULT"
            if [ -n "$FAILED_STEP" ]; then
              SUMMARY="$SUMMARY; failed step: $FAILED_STEP"
            fi
            if [ -n "$JOB_URL" ]; then
              SUMMARY="$SUMMARY. See: $JOB_URL"
            fi
            echo "::error::$SUMMARY" >&2
            {
              echo "## Codex Review Gate"
              echo
              echo "- Review result: \`$REVIEW_RESULT\`"
              if [ -n "$FAILED_STEP" ]; then
                echo "- Failed step: \`$FAILED_STEP\`"
              fi
              if [ -n "$JOB_URL" ]; then
                echo "- Review job: $JOB_URL"
              fi
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          case "$REVIEW_VERDICT" in
            pass)
              {
                echo "## Codex Review Gate"
                echo
                echo "- Verdict: \`pass\`"
                echo "- Summary: $REVIEW_SUMMARY"
              } >> "$GITHUB_STEP_SUMMARY"
              echo "Codex review passed."
              ;;
            rework_required)
              SUMMARY="Codex review requires developer re-work"
              if [ -n "$FIRST_FINDING" ]; then
                SUMMARY="$SUMMARY; first finding: $FIRST_FINDING"
              fi
              echo "::error::$SUMMARY" >&2
              {
                echo "## Codex Review Gate"
                echo
                echo "- Verdict: \`rework_required\`"
                echo "- Summary: $REVIEW_SUMMARY"
                echo "- Findings count: $FINDINGS_COUNT"
                if [ -n "$FINDINGS_DIGEST" ]; then
                  echo "- Top findings: $FINDINGS_DIGEST"
                fi
              } >> "$GITHUB_STEP_SUMMARY"
              exit 1
              ;;
            review_error)
              SUMMARY="Codex review could not complete cleanly"
              if [ -n "$REVIEW_SUMMARY" ]; then
                SUMMARY="$SUMMARY; $REVIEW_SUMMARY"
              fi
              echo "::error::$SUMMARY" >&2
              {
                echo "## Codex Review Gate"
                echo
                echo "- Verdict: \`review_error\`"
                echo "- Summary: $REVIEW_SUMMARY"
              } >> "$GITHUB_STEP_SUMMARY"
              exit 1
              ;;
            *)
              echo "::error::Codex review returned an unknown verdict: $REVIEW_VERDICT" >&2
              exit 1
              ;;
          esac
