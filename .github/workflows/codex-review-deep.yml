name: Codex Deep PR Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: string
      review_focus:
        description: Review angle
        required: true
        default: deep
        type: choice
        options:
          - deep
          - security
          - tests
          - workflows
      include_lint:
        description: Run lint before the review
        required: true
        default: true
        type: boolean
      include_tests:
        description: Run tests before the review
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: codex-review-deep-${{ inputs.pr_number }}-${{ inputs.review_focus }}
  cancel-in-progress: true

jobs:
  deep-review:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Install jq
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Resolve pull request metadata
        id: pr
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail
          API_ROOT="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          PR_JSON=$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${API_ROOT}/pulls/${PR_NUMBER}")

          HEAD_REPO=$(printf '%s' "$PR_JSON" | jq -r '.head.repo.full_name')
          if [ "$HEAD_REPO" != "$GITHUB_REPOSITORY" ]; then
            echo "::error::Deep review is blocked for forked PRs because this workflow uses repository secrets." >&2
            exit 1
          fi

          {
            echo "number=$(printf '%s' "$PR_JSON" | jq -r '.number')"
            echo "title=$(printf '%s' "$PR_JSON" | jq -r '.title')"
            echo "base_ref=$(printf '%s' "$PR_JSON" | jq -r '.base.ref')"
            echo "head_ref=$(printf '%s' "$PR_JSON" | jq -r '.head.ref')"
            echo "head_sha=$(printf '%s' "$PR_JSON" | jq -r '.head.sha')"
            echo "html_url=$(printf '%s' "$PR_JSON" | jq -r '.html_url')"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout pull request head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          fetch-depth: 0

      - name: Fetch base branch
        shell: bash
        env:
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "${BASE_REF}:refs/remotes/origin/${BASE_REF}"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Capture lint output
        id: lint
        shell: bash
        env:
          INCLUDE_LINT: ${{ inputs.include_lint }}
        run: |
          set -euo pipefail
          mkdir -p codex-review-artifacts
          if [ "$INCLUDE_LINT" != "true" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if npm run lint > codex-review-artifacts/lint.txt 2>&1; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Capture test output
        id: test
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INCLUDE_TESTS: ${{ inputs.include_tests }}
        run: |
          set -euo pipefail
          mkdir -p codex-review-artifacts
          if [ "$INCLUDE_TESTS" != "true" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if npm test > codex-review-artifacts/test.txt 2>&1; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare review prompt
        shell: bash
        env:
          REVIEW_FOCUS: ${{ inputs.review_focus }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_URL: ${{ steps.pr.outputs.html_url }}
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          LINT_STATUS: ${{ steps.lint.outputs.status }}
          TEST_STATUS: ${{ steps.test.outputs.status }}
        run: |
          set -euo pipefail
          case "$REVIEW_FOCUS" in
            deep)
              FOCUS_INSTRUCTIONS="Perform a broad, high-effort review. Prioritise correctness, behavioural regressions, security issues, workflow or deployment breakage, data loss risk, and missing tests. Spend extra attention on subtle edge cases and cross-file interactions."
              ;;
            security)
              FOCUS_INSTRUCTIONS="Focus on auth, secrets handling, client/server boundaries, unsafe data exposure, injection risk, workflow credential use, and any persistence or encryption weaknesses."
              ;;
            tests)
              FOCUS_INSTRUCTIONS="Focus on missing coverage, fragile assertions, regressions that tests should catch, and changes whose behaviour is insufficiently verified."
              ;;
            workflows)
              FOCUS_INSTRUCTIONS="Focus on GitHub Actions, Docker, Azure deployment wiring, build-time versus runtime env mistakes, branch gating, and CI reliability regressions."
              ;;
            *)
              echo "::error::Unsupported review focus: $REVIEW_FOCUS" >&2
              exit 1
              ;;
          esac

          {
            echo "Review this pull request for the Later Life Planner repository."
            echo
            echo "Pull request:"
            echo "- Number: #${PR_NUMBER}"
            echo "- Title: ${PR_TITLE}"
            echo "- URL: ${PR_URL}"
            echo "- Base branch: origin/${BASE_REF}"
            echo "- Head ref: ${HEAD_REF}"
            echo "- Review focus: ${REVIEW_FOCUS}"
            echo
            echo "Verification context:"
            echo "- npm run lint: ${LINT_STATUS}"
            echo "- npm test: ${TEST_STATUS}"
            echo "- Supplemental logs, if present: codex-review-artifacts/lint.txt and codex-review-artifacts/test.txt"
            echo
            echo "Instructions:"
            echo "- $FOCUS_INSTRUCTIONS"
            echo "- Findings must come first, ordered by severity."
            echo "- Prioritise real defects and merge risk over style."
            echo "- Include specific file and line references where possible."
            echo "- Mention residual risks or testing gaps briefly at the end."
            echo "- If there are no findings, say 'No findings' and then list any residual risks or verification gaps."
          } > codex-review-prompt.md

      - name: Prepare CODEX_HOME
        shell: bash
        env:
          CODEX_HOME: ${{ runner.temp }}/.codex
        run: |
          set -euo pipefail
          mkdir -p "$CODEX_HOME"
          chmod 700 "$CODEX_HOME"
          cat > "$CODEX_HOME/config.toml" <<'EOF'
          cli_auth_credentials_store = "file"
          EOF

      - name: Azure login via Codex credential
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0 — current official release still runs on Node 20; update when Azure ships a Node 24 build
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_CODEX_KV }}

      - name: Restore auth.json from Azure Key Vault
        shell: bash
        env:
          CODEX_HOME: ${{ runner.temp }}/.codex
          KEYVAULT_NAME: ${{ secrets.AZURE_KEYVAULT_NAME }}
          KEYVAULT_SECRET_NAME: codex-auth-json
        run: |
          set -euo pipefail
          az keyvault secret show \
            --vault-name "$KEYVAULT_NAME" \
            --name "$KEYVAULT_SECRET_NAME" \
            --query value \
            --output tsv > "$CODEX_HOME/auth.json"
          chmod 600 "$CODEX_HOME/auth.json"

      - name: Install Codex CLI
        shell: bash
        run: |
          set -euo pipefail
          npm install -g @openai/codex

      - name: Run Codex deep review
        shell: bash
        env:
          CODEX_HOME: ${{ runner.temp }}/.codex
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          # `codex exec review` rejects `--base` when a custom prompt is supplied in the
          # current CLI, so deep review uses generic exec with an explicit prompt file.
          codex exec \
            --ephemeral \
            --full-auto \
            -o codex-review.md \
            - < codex-review-prompt.md
          if ! grep -q '[^[:space:]]' codex-review.md; then
            echo "::error::Codex review output file is empty." >&2
            exit 1
          fi

      - name: Prepare sticky comment
        shell: bash
        env:
          REVIEW_FOCUS: ${{ inputs.review_focus }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          LINT_STATUS: ${{ steps.lint.outputs.status }}
          TEST_STATUS: ${{ steps.test.outputs.status }}
        run: |
          set -euo pipefail
          {
            echo "<!-- codex-deep-pr-review:${REVIEW_FOCUS} -->"
            echo "## Codex Deep PR Review"
            echo
            echo "- Focus: \`${REVIEW_FOCUS}\`"
            echo "- Lint: \`${LINT_STATUS}\`"
            echo "- Tests: \`${TEST_STATUS}\`"
            echo
            cat codex-review.md
          } > codex-review-comment.md

      - name: Publish PR comment
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REVIEW_FOCUS: ${{ inputs.review_focus }}
        run: |
          set -euo pipefail
          API_ROOT="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          COMMENTS_POST_URL="${API_ROOT}/issues/${PR_NUMBER}/comments"
          RESPONSE_FILE=$(mktemp)
          trap 'rm -f "$RESPONSE_FILE"' EXIT

          github_api() {
            local method=$1
            local url=$2
            local data_file=${3-}
            local status

            if [ -n "$data_file" ]; then
              status=$(curl -sS -o "$RESPONSE_FILE" -w '%{http_code}' \
                -X "$method" \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "Content-Type: application/json" \
                "$url" \
                --data @"$data_file")
            else
              status=$(curl -sS -o "$RESPONSE_FILE" -w '%{http_code}' \
                -X "$method" \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "$url")
            fi

            case "$status" in
              200|201)
                cat "$RESPONSE_FILE"
                return 0
                ;;
              403)
                echo "::warning::Skipping PR comment because the workflow token cannot write issue comments for this event (HTTP 403)." >&2
                return 10
                ;;
              *)
                echo "::warning::Unable to publish Codex deep review comment (HTTP $status)." >&2
                if [ -s "$RESPONSE_FILE" ]; then
                  head -c 500 "$RESPONSE_FILE" >&2
                  echo >&2
                fi
                return 11
                ;;
            esac
          }

          COMMENT_ID=""
          for page in 1 2 3 4 5; do
            PAGE_JSON=$(github_api GET "${API_ROOT}/issues/${PR_NUMBER}/comments?per_page=100&page=${page}") || API_STATUS=$?
            if [ "${API_STATUS:-0}" -eq 10 ]; then
              exit 0
            fi
            if [ "${API_STATUS:-0}" -ne 0 ]; then
              exit 0
            fi
            unset API_STATUS
            PAGE_COMMENT_ID=$(printf '%s' "$PAGE_JSON" |
              jq -r --arg focus "$REVIEW_FOCUS" '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("<!-- codex-deep-pr-review:\($focus) -->"))) | .id' |
              tail -n 1)
            if [ -n "$PAGE_COMMENT_ID" ]; then
              COMMENT_ID="$PAGE_COMMENT_ID"
            fi
            if [ -n "$COMMENT_ID" ]; then
              break
            fi
          done

          jq -Rs '{body: .}' codex-review-comment.md > codex-review-payload.json

          if [ -n "$COMMENT_ID" ]; then
            github_api PATCH "${API_ROOT}/issues/comments/${COMMENT_ID}" codex-review-payload.json > /dev/null || true
          else
            github_api POST "$COMMENTS_POST_URL" codex-review-payload.json > /dev/null || true
          fi

      - name: Add job summary
        shell: bash
        env:
          REVIEW_FOCUS: ${{ inputs.review_focus }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          LINT_STATUS: ${{ steps.lint.outputs.status }}
          TEST_STATUS: ${{ steps.test.outputs.status }}
        run: |
          set -euo pipefail
          {
            echo '## Codex Deep PR Review'
            echo
            echo "- Pull request: #${PR_NUMBER}"
            echo "- Focus: ${REVIEW_FOCUS}"
            echo "- Lint: ${LINT_STATUS}"
            echo "- Tests: ${TEST_STATUS}"
            echo
            cat codex-review.md
          } >> "$GITHUB_STEP_SUMMARY"
