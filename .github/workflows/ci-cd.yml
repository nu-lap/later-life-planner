# CI/CD for later-life-planner
# Test on every push/PR to master when app, test, or workflow files change.
# Build + deploy only when container-affecting files change on master.
# Manual trigger via workflow_dispatch always runs CI, but deploy still stays gated to master.
name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_RESOURCE_GROUP: rg-later-life-planner
  APP_NAME: ca-later-life-planner
  ACR_NAME: acrsharedresourcesuks
  ACR_LOGIN_SERVER: acrsharedresourcesuks.azurecr.io
  COSMOS_RESOURCE_GROUP: rg-shared-resources-uks
  COSMOS_ACCOUNT: cosmos-llp-uks
  KEY_VAULT_RESOURCE_GROUP: rg-later-life-planner
  KEY_VAULT_NAME: kv-llp-app

jobs:
  # Detect whether a change should run CI and whether it should rebuild the container.
  # workflow_dispatch always sets both outputs to true so manual runs execute the full pipeline on master.
  changes:
    runs-on: ubuntu-latest
    outputs:
      ci: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.ci }}
      container: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.container }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@9d7afb8d214ad99e78fbd4247752c4caed2b6e4c # v4.0.0
        id: filter
        with:
          filters: |
            ci:
              - 'src/**'
              - 'public/**'
              - 'tests/**'
              - '.github/workflows/**'
              - 'package.json'
              - 'package-lock.json'
              - 'next.config.mjs'
              - 'tsconfig.json'
              - 'tsconfig.test.json'
              - 'tailwind.config.*'
              - 'postcss.config.*'
              - 'vitest.config.*'
              - 'playwright.config.ts'
              - 'Dockerfile'
              - '.eslintrc.*'
            container:
              - 'src/**'
              - 'public/**'
              - 'package.json'
              - 'package-lock.json'
              - 'next.config.mjs'
              - 'tsconfig.json'
              - 'tailwind.config.*'
              - 'postcss.config.*'
              - 'Dockerfile'
              - '.eslintrc.*'

  test:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '25'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint

      - run: npm run test:coverage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 1

  e2e:
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '25'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Wizard + account specs: dev server, no Clerk keys required
      - name: Start dev server
        run: npm run dev &
        env:
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: '1x00000000000000000000AA'

      - name: Wait for dev server
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run wizard + account e2e tests
        run: npx playwright test tests/e2e/specs/wizard.spec.ts tests/e2e/specs/account.spec.ts
        env:
          CI: true

      # Sync/encryption spec: only runs when Clerk test credentials are configured
      - name: Run sync e2e tests
        if: ${{ secrets.CLERK_SECRET_KEY_TEST != '' }}
        run: npx playwright test tests/e2e/specs/sync.spec.ts
        env:
          CI: true
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY_TEST }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY_TEST }}
          AZURE_COSMOSDB_ENDPOINT: ${{ secrets.AZURE_COSMOSDB_ENDPOINT }}
          E2E_CLERK_USER_ID: ${{ secrets.E2E_CLERK_USER_ID }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  container-build-check:
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: |
      github.event_name == 'pull_request' &&
      needs.changes.outputs.container == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        run: |
          docker buildx create --name later-life-planner-pr-builder --driver docker-container --use || \
          docker buildx use later-life-planner-pr-builder
          docker buildx inspect --bootstrap

      - name: Build image for validation
        env:
          BUILD_TURNSTILE: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          BUILD_CLERK_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          BUILD_OPTIMIZER: ${{ secrets.NEXT_PUBLIC_OPTIMIZER_ENABLED || 'true' }}
          BUILD_PRO: ${{ secrets.NEXT_PUBLIC_PRO_ENABLED || 'false' }}
        run: |
          docker buildx build \
            --file Dockerfile \
            --load \
            --tag later-life-planner:pr-check \
            --build-arg "NEXT_PUBLIC_TURNSTILE_SITE_KEY=${BUILD_TURNSTILE}" \
            --build-arg "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${BUILD_CLERK_KEY}" \
            --build-arg "NEXT_PUBLIC_OPTIMIZER_ENABLED=${BUILD_OPTIMIZER}" \
            --build-arg "NEXT_PUBLIC_PRO_ENABLED=${BUILD_PRO}" \
            --build-arg NEXT_PUBLIC_CLERK_SIGN_IN_URL="/sign-in" \
            --build-arg NEXT_PUBLIC_CLERK_SIGN_UP_URL="/sign-up" \
            --build-arg NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL="/" \
            --build-arg NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL="/" \
            .

  validate-tax-rules:
    name: Validate HMRC Tax Rule Snapshot
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '25'
          cache: 'npm'

      - run: npm ci

      - name: Regenerate snapshot
        # The gen:tax-snapshot script hard-codes known rule values and re-emits
        # taxRuleSnapshot.ts. This step confirms the committed snapshot is in sync
        # with the generator. If the generator or values change, this step regenerates
        # the file; the next step then fails if the output differs from the committed file.
        run: npm run gen:tax-snapshot

      - name: Assert snapshot unchanged (drift detection)
        run: |
          if ! git diff --exit-code src/config/taxRuleSnapshot.ts; then
            echo "::error::taxRuleSnapshot.ts differs from the committed version."
            echo "::error::Run 'npm run gen:tax-snapshot' locally, review the diff, and commit the updated snapshot."
            exit 1
          fi

      - name: Run tax calculation tests
        run: npx vitest run tests/unit/taxCalculations.test.ts
        env:
          NODE_ENV: test

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: needs.changes.outputs.ci == 'true' && needs.test.result == 'success'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@383f7e52eae3ab0510c3cb0e7d9d150bbaeab838 # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  merge-gate:
    runs-on: ubuntu-latest
    needs: [changes, test, e2e, container-build-check, validate-tax-rules, sonar]
    if: ${{ always() && github.event_name == 'pull_request' }}
    steps:
      - name: Fail if any CI prerequisite failed
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          TEST_RESULT: ${{ needs.test.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
          CONTAINER_BUILD_RESULT: ${{ needs.container-build-check.result }}
          VALIDATE_TAX_RESULT: ${{ needs.validate-tax-rules.result }}
          SONAR_RESULT: ${{ needs.sonar.result }}
        run: |
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "::error::changes job ended with result: $CHANGES_RESULT"
            exit 1
          fi

          if [ "$TEST_RESULT" != "success" ] && [ "$TEST_RESULT" != "skipped" ]; then
            echo "::error::test job ended with result: $TEST_RESULT"
            exit 1
          fi

          if [ "$E2E_RESULT" != "success" ] && [ "$E2E_RESULT" != "skipped" ]; then
            echo "::error::e2e job ended with result: $E2E_RESULT"
            exit 1
          fi

          if [ "$CONTAINER_BUILD_RESULT" != "success" ] && [ "$CONTAINER_BUILD_RESULT" != "skipped" ]; then
            echo "::error::container-build-check job ended with result: $CONTAINER_BUILD_RESULT"
            exit 1
          fi

          if [ "$VALIDATE_TAX_RESULT" != "success" ] && [ "$VALIDATE_TAX_RESULT" != "skipped" ]; then
            echo "::error::validate-tax-rules job ended with result: $VALIDATE_TAX_RESULT"
            exit 1
          fi

          if [ "$SONAR_RESULT" != "success" ] && [ "$SONAR_RESULT" != "skipped" ]; then
            echo "::error::sonar job ended with result: $SONAR_RESULT"
            exit 1
          fi

          echo "All merge-gate prerequisites passed."

  build-and-push:
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: |
      (github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch') &&
      needs.changes.outputs.container == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to Azure
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0 — current official release still runs on Node 20; update when Azure ships a Node 24 build
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name "$ACR_NAME"

      - name: Set up Docker Buildx
        run: |
          docker buildx create --name later-life-planner-builder --driver docker-container --use || \
          docker buildx use later-life-planner-builder
          docker buildx inspect --bootstrap

      - name: Build and push image
        env:
          TAG_RUN_NUMBER: ${{ github.run_number }}
          TAG_SHA: ${{ github.sha }}
          BUILD_ARG_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          BUILD_ARG_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          BUILD_ARG_OPTIMIZER_ENABLED: ${{ secrets.NEXT_PUBLIC_OPTIMIZER_ENABLED || 'true' }}
          BUILD_ARG_PRO_ENABLED: ${{ secrets.NEXT_PUBLIC_PRO_ENABLED || 'false' }}
          BUILD_ARG_LLM_PROVIDER: "azure-openai"
        run: |
          IMAGE="${ACR_LOGIN_SERVER}/later-life-planner"
          TAG_ARGS=(
            --tag "${IMAGE}:${TAG_RUN_NUMBER}"
            --tag "${IMAGE}:${TAG_SHA}"
          )
          # Only tag :latest on master so branch dispatch runs don't overwrite the shared tag.
          if [ "${GITHUB_REF}" = "refs/heads/master" ]; then
            TAG_ARGS+=(--tag "${IMAGE}:latest")
          fi
          docker buildx build \
            --file Dockerfile \
            --push \
            "${TAG_ARGS[@]}" \
            --cache-from "type=gha" \
            --cache-to "type=gha,mode=max" \
            --build-arg "NEXT_PUBLIC_TURNSTILE_SITE_KEY=${BUILD_ARG_TURNSTILE_SITE_KEY}" \
            --build-arg "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${BUILD_ARG_CLERK_PUBLISHABLE_KEY}" \
            --build-arg "NEXT_PUBLIC_OPTIMIZER_ENABLED=${BUILD_ARG_OPTIMIZER_ENABLED}" \
            --build-arg "NEXT_PUBLIC_PRO_ENABLED=${BUILD_ARG_PRO_ENABLED}" \
            --build-arg "NEXT_PUBLIC_LLM_PROVIDER=${BUILD_ARG_LLM_PROVIDER}" \
            --build-arg "NEXT_PUBLIC_CLERK_SIGN_IN_URL=/sign-in" \
            --build-arg "NEXT_PUBLIC_CLERK_SIGN_UP_URL=/sign-up" \
            --build-arg "NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL=/" \
            --build-arg "NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL=/" \
            .

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      github.ref == 'refs/heads/master' &&
      needs.build-and-push.result == 'success'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Login to Azure
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0 — current official release still runs on Node 20; update when Azure ships a Node 24 build
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update ACA secret and deploy
        id: deploy
        env:
          SECRET_ANTHROPIC: ${{ secrets.ANTHROPIC_API_KEY }}
          SECRET_TURNSTILE: ${{ secrets.TURNSTILE_SECRET_KEY }}
          SECRET_CLERK: ${{ secrets.CLERK_SECRET_KEY }}
          BUILD_CLERK_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          BUILD_OPTIMIZER: ${{ secrets.NEXT_PUBLIC_OPTIMIZER_ENABLED || 'true' }}
          BUILD_PRO: ${{ secrets.NEXT_PUBLIC_PRO_ENABLED || 'false' }}
        run: |
          COSMOS_ENDPOINT=$(az cosmosdb show \
            --name "$COSMOS_ACCOUNT" \
            --resource-group "$COSMOS_RESOURCE_GROUP" \
            --query documentEndpoint \
            -o tsv)
          KEY_VAULT_URL=$(az keyvault show \
            --name "$KEY_VAULT_NAME" \
            --resource-group "$KEY_VAULT_RESOURCE_GROUP" \
            --query properties.vaultUri \
            -o tsv)
          if [ -z "$COSMOS_ENDPOINT" ] || [ -z "$KEY_VAULT_URL" ]; then
            echo "::error::Could not resolve Cosmos DB or Key Vault endpoints for deploy env wiring." >&2
            exit 1
          fi
          az containerapp secret set \
            --name "$APP_NAME" \
            --resource-group "$APP_RESOURCE_GROUP" \
            --secrets \
              "anthropic-api-key=${SECRET_ANTHROPIC}" \
              "turnstile-secret-key=${SECRET_TURNSTILE}" \
              "clerk-secret-key=${SECRET_CLERK}"
          az containerapp update \
            --name "$APP_NAME" \
            --resource-group "$APP_RESOURCE_GROUP" \
            --image "$ACR_LOGIN_SERVER/later-life-planner:${{ github.sha }}" \
            --set-env-vars \
              "ANTHROPIC_API_KEY=secretref:anthropic-api-key" \
              "TURNSTILE_SECRET_KEY=secretref:turnstile-secret-key" \
              "CLERK_SECRET_KEY=secretref:clerk-secret-key" \
              "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${BUILD_CLERK_KEY}" \
              "NEXT_PUBLIC_OPTIMIZER_ENABLED=${BUILD_OPTIMIZER}" \
              "NEXT_PUBLIC_PRO_ENABLED=${BUILD_PRO}" \
              "NEXT_PUBLIC_LLM_PROVIDER=azure-openai" \
              "LLM_PROVIDER=azure-openai" \
              "AZURE_OPENAI_ENDPOINT=https://hmrc-tax-openai.openai.azure.com/" \
              "AZURE_OPENAI_CHAT_DEPLOYMENT=gpt-4-1-mini" \
              "AZURE_OPENAI_EMBEDDING_DEPLOYMENT=text-embedding-3-large" \
              "AZURE_OPENAI_API_VERSION=2024-10-21" \
              "HMRC_RAG_DATABASE=hmrc-guidance" \
              "HMRC_RAG_CONTAINER=hmrc-chunks" \
              "NEXT_PUBLIC_CLERK_SIGN_IN_URL=/sign-in" \
              "NEXT_PUBLIC_CLERK_SIGN_UP_URL=/sign-up" \
              "NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL=/" \
              "NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL=/" \
              "AZURE_COSMOSDB_ENDPOINT=$COSMOS_ENDPOINT" \
              "AZURE_COSMOSDB_DATABASE=later-life-planner" \
              "AZURE_COSMOSDB_CONTAINER=user-plans" \
              "AZURE_KEY_VAULT_URL=$KEY_VAULT_URL" \
            --query properties.latestRevisionName \
            -o tsv >/dev/null
          az containerapp ingress update \
            --name "$APP_NAME" \
            --resource-group "$APP_RESOURCE_GROUP" \
            --target-port 3000 \
            --type external \
            --transport auto \
            --only-show-errors >/dev/null
          REVISION=$(az containerapp show \
            --name "$APP_NAME" \
            --resource-group "$APP_RESOURCE_GROUP" \
            --query properties.latestRevisionName \
            -o tsv)
          if [ -z "$REVISION" ]; then
            echo "::error::No latest revision name returned after container app update." >&2
            exit 1
          fi
          echo "revision=$REVISION" >> "$GITHUB_OUTPUT"

      - name: Restart revision to pick up secret changes
        run: |
          REVISION="${{ steps.deploy.outputs.revision }}"
          az containerapp revision restart \
            --name "$APP_NAME" \
            --resource-group "$APP_RESOURCE_GROUP" \
            --revision "$REVISION"
          echo "Restarted revision: $REVISION"

      - name: Show app URL
        run: |
          fqdn=$(az containerapp show \
            --name "$APP_NAME" \
            --resource-group "$APP_RESOURCE_GROUP" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "Deployed to: https://$fqdn"

  persistence-smoke-test:
    runs-on: ubuntu-latest
    needs: deploy
    if: |
      github.ref == 'refs/heads/master' &&
      needs.deploy.result == 'success'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Login to Azure
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0 — current official release still runs on Node 20; update when Azure ships a Node 24 build
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Smoke-test persistence resource access wiring
        run: |
          set -euo pipefail

          APP_RG="${APP_RESOURCE_GROUP}"
          COSMOS_RG="${COSMOS_RESOURCE_GROUP}"
          KEY_VAULT_RG="${KEY_VAULT_RESOURCE_GROUP}"
          COSMOS_DATA_CONTRIBUTOR_ROLE_ID="00000000-0000-0000-0000-000000000002"

          PRINCIPAL_ID=$(az containerapp show \
            --name "$APP_NAME" \
            --resource-group "$APP_RG" \
            --query identity.principalId \
            -o tsv)
          if [ -z "$PRINCIPAL_ID" ]; then
            echo "::error::Container App managed identity principalId is missing." >&2
            exit 1
          fi

          COSMOS_ENV=$(az containerapp show \
            --name "$APP_NAME" \
            --resource-group "$APP_RG" \
            --query "properties.template.containers[0].env[?name=='AZURE_COSMOSDB_ENDPOINT'].value | [0]" \
            -o tsv)
          KV_ENV=$(az containerapp show \
            --name "$APP_NAME" \
            --resource-group "$APP_RG" \
            --query "properties.template.containers[0].env[?name=='AZURE_KEY_VAULT_URL'].value | [0]" \
            -o tsv)
          if [ -z "$COSMOS_ENV" ] || [ -z "$KV_ENV" ]; then
            echo "::error::Persistence env vars are not populated on Container App." >&2
            exit 1
          fi

          COSMOS_ID=$(az cosmosdb show \
            --name "$COSMOS_ACCOUNT" \
            --resource-group "$COSMOS_RG" \
            --query id \
            -o tsv)
          EXPECTED_COSMOS_ROLE_DEF_ID="${COSMOS_ID}/sqlRoleDefinitions/${COSMOS_DATA_CONTRIBUTOR_ROLE_ID}"

          COSMOS_ROLE_COUNT=0
          for _ in 1 2 3 4 5; do
            COSMOS_ROLE_COUNT=$(az cosmosdb sql role assignment list \
              --account-name "$COSMOS_ACCOUNT" \
              --resource-group "$COSMOS_RG" \
              --query "[?principalId=='${PRINCIPAL_ID}' && roleDefinitionId=='${EXPECTED_COSMOS_ROLE_DEF_ID}'] | length(@)" \
              -o tsv)
            if [ "${COSMOS_ROLE_COUNT:-0}" -ge 1 ]; then
              break
            fi
            sleep 10
          done
          if [ "${COSMOS_ROLE_COUNT:-0}" -lt 1 ]; then
            echo "::error::Managed identity lacks Cosmos DB data contributor role assignment." >&2
            exit 1
          fi

          KEY_VAULT_ID=$(az keyvault show \
            --name "$KEY_VAULT_NAME" \
            --resource-group "$KEY_VAULT_RG" \
            --query id \
            -o tsv)
          KEY_VAULT_ROLE_COUNT=0
          for _ in 1 2 3 4 5; do
            KEY_VAULT_ROLE_COUNT=$(az role assignment list \
              --assignee-object-id "$PRINCIPAL_ID" \
              --scope "$KEY_VAULT_ID" \
              --query "[?roleDefinitionName=='Key Vault Crypto User'] | length(@)" \
              -o tsv)
            if [ "${KEY_VAULT_ROLE_COUNT:-0}" -ge 1 ]; then
              break
            fi
            sleep 10
          done
          if [ "${KEY_VAULT_ROLE_COUNT:-0}" -lt 1 ]; then
            echo "::error::Managed identity lacks Key Vault Crypto User role assignment." >&2
            exit 1
          fi

          echo "Persistence smoke-test passed."
