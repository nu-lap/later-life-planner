# CI/CD for later-life-planner
# Test on every push/PR to master when app, test, or workflow files change.
# Build + deploy only when container-affecting files change on master.
# Manual trigger via workflow_dispatch always runs CI, but deploy still stays gated to master.
name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect whether a change should run CI and whether it should rebuild the container.
  # workflow_dispatch always sets both outputs to true so manual runs execute the full pipeline on master.
  changes:
    outputs:
      ci: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.ci }}
      container: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.container }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@9d7afb8d214ad99e78fbd4247752c4caed2b6e4c # v4.0.0
        id: filter
        with:
          filters: |
            ci:
              - 'src/**'
              - 'public/**'
              - 'tests/**'
              - '.github/workflows/**'
              - 'package.json'
              - 'package-lock.json'
              - 'next.config.mjs'
              - 'tsconfig.json'
              - 'tsconfig.test.json'
              - 'tailwind.config.*'
              - 'postcss.config.*'
              - 'vitest.config.*'
              - 'Dockerfile'
              - '.eslintrc.*'
            container:
              - 'src/**'
              - 'public/**'
              - 'package.json'
              - 'package-lock.json'
              - 'next.config.mjs'
              - 'tsconfig.json'
              - 'tailwind.config.*'
              - 'postcss.config.*'
              - 'Dockerfile'
              - '.eslintrc.*'

  test:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint

      - run: npm test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  container-build-check:
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: |
      github.event_name == 'pull_request' &&
      needs.changes.outputs.container == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        run: |
          docker buildx create --name later-life-planner-pr-builder --driver docker-container --use || \
          docker buildx use later-life-planner-pr-builder
          docker buildx inspect --bootstrap

      - name: Build image for validation
        run: |
          docker buildx build \
            --file Dockerfile \
            --load \
            --tag later-life-planner:pr-check \
            --build-arg NEXT_PUBLIC_TURNSTILE_SITE_KEY="${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}" \
            --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" \
            --build-arg NEXT_PUBLIC_CLERK_SIGN_IN_URL="/sign-in" \
            --build-arg NEXT_PUBLIC_CLERK_SIGN_UP_URL="/sign-up" \
            --build-arg NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL="/" \
            --build-arg NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL="/" \
            .

  merge-gate:
    runs-on: ubuntu-latest
    needs: [changes, test, container-build-check]
    if: ${{ always() && github.event_name == 'pull_request' }}
    steps:
      - name: Fail if any CI prerequisite failed
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          TEST_RESULT: ${{ needs.test.result }}
          CONTAINER_BUILD_RESULT: ${{ needs.container-build-check.result }}
        run: |
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "::error::changes job ended with result: $CHANGES_RESULT"
            exit 1
          fi

          if [ "$TEST_RESULT" != "success" ] && [ "$TEST_RESULT" != "skipped" ]; then
            echo "::error::test job ended with result: $TEST_RESULT"
            exit 1
          fi

          if [ "$CONTAINER_BUILD_RESULT" != "success" ] && [ "$CONTAINER_BUILD_RESULT" != "skipped" ]; then
            echo "::error::container-build-check job ended with result: $CONTAINER_BUILD_RESULT"
            exit 1
          fi

          echo "All merge-gate prerequisites passed."

  build-and-push:
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: |
      github.ref == 'refs/heads/master' &&
      needs.changes.outputs.container == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to Azure
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0 — latest; no Node 24 release yet, update when available
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name acrblackdog69llp

      - name: Set up Docker Buildx
        run: |
          docker buildx create --name later-life-planner-builder --driver docker-container --use || \
          docker buildx use later-life-planner-builder
          docker buildx inspect --bootstrap

      - name: Build and push image
        run: |
          IMAGE="acrblackdog69llp.azurecr.io/later-life-planner"
          docker buildx build \
            --file Dockerfile \
            --push \
            --tag "$IMAGE:${{ github.run_number }}" \
            --tag "$IMAGE:${{ github.sha }}" \
            --tag "$IMAGE:latest" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --build-arg NEXT_PUBLIC_TURNSTILE_SITE_KEY="${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}" \
            --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" \
            --build-arg NEXT_PUBLIC_CLERK_SIGN_IN_URL="/sign-in" \
            --build-arg NEXT_PUBLIC_CLERK_SIGN_UP_URL="/sign-up" \
            --build-arg NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL="/" \
            --build-arg NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL="/" \
            .

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      github.ref == 'refs/heads/master' &&
      needs.build-and-push.result == 'success'
    steps:
      - name: Login to Azure
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0 — latest; no Node 24 release yet, update when available
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update ACA secret and deploy
        id: deploy
        run: |
          az containerapp secret set \
            --name ca-later-life-planner \
            --resource-group rg-later-life-planner \
            --secrets \
              "anthropic-api-key=${{ secrets.ANTHROPIC_API_KEY }}" \
              "turnstile-secret-key=${{ secrets.TURNSTILE_SECRET_KEY }}" \
              "clerk-secret-key=${{ secrets.CLERK_SECRET_KEY }}"
          REVISION=$(az containerapp update \
            --name ca-later-life-planner \
            --resource-group rg-later-life-planner \
            --image acrblackdog69llp.azurecr.io/later-life-planner:${{ github.sha }} \
            --set-env-vars \
              "ANTHROPIC_API_KEY=secretref:anthropic-api-key" \
              "TURNSTILE_SECRET_KEY=secretref:turnstile-secret-key" \
              "CLERK_SECRET_KEY=secretref:clerk-secret-key" \
              "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" \
              "NEXT_PUBLIC_CLERK_SIGN_IN_URL=/sign-in" \
              "NEXT_PUBLIC_CLERK_SIGN_UP_URL=/sign-up" \
              "NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL=/" \
              "NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL=/" \
            --query properties.latestRevisionName \
            -o tsv)
          if [ -z "$REVISION" ]; then
            echo "::error::No revision name returned from az containerapp update." >&2
            exit 1
          fi
          echo "revision=$REVISION" >> "$GITHUB_OUTPUT"

      - name: Restart revision to pick up secret changes
        run: |
          REVISION="${{ steps.deploy.outputs.revision }}"
          az containerapp revision restart \
            --name ca-later-life-planner \
            --resource-group rg-later-life-planner \
            --revision "$REVISION"
          echo "Restarted revision: $REVISION"

      - name: Show app URL
        run: |
          fqdn=$(az containerapp show \
            --name ca-later-life-planner \
            --resource-group rg-later-life-planner \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "Deployed to: https://$fqdn"
