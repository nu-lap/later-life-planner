name: codex-review-watcher

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: codex-repair-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  maybe-repair:
    if: >
      (
        github.event_name == 'pull_request' ||
        github.event_name == 'pull_request_review' ||
        github.event_name == 'pull_request_review_comment' ||
        github.event_name == 'issue_comment'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.event.issue.pull_request.head.ref }}
          fetch-depth: 0

      - name: Install gh and jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Gather PR metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            PR_NUMBER="${{ github.event.issue.number }}"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_ENV

      - name: Fetch reviews and comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews > reviews.json
          gh api repos/${{ github.repository }}/pulls/$PR_NUMBER/comments > review_comments.json
          gh api repos/${{ github.repository }}/issues/$PR_NUMBER/comments > issue_comments.json

      - name: Extract Codex fix requests
        run: |
          python .github/scripts/extract_codex_requests.py \
            --reviews reviews.json \
            --review-comments review_comments.json \
            --issue-comments issue_comments.json \
            --codex-actor "codex" \
            --out fix_requests.json

          cat fix_requests.json

      - name: Stop if nothing to fix
        run: |
          COUNT=$(jq '.requests | length' fix_requests.json)
          if [ "$COUNT" -eq 0 ]; then
            echo "No actionable Codex findings."
            exit 0
          fi

      - name: Enforce max iterations
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/enforce_iteration_limit.py \
            --repo ${{ github.repository }} \
            --pr $PR_NUMBER \
            --max-iterations 3

      - name: Run repair agent
        env:
          FIX_REQUESTS_JSON: ${{ toJson(fromJson(steps.none.outputs.none || '{}')) }}
        run: |
          codex exec "
          You are repairing PR #$PR_NUMBER in repo ${{ github.repository }}.
          Read .github/agent-input/fix_requests.json and fix only those issues.
          Run: make test
          Commit if needed with message: chore(ai): address Codex review findings
          Output JSON result to agent_result.json
          " || true

      - name: Commit and push changes
        run: |
          if ! git diff --quiet; then
            git config user.name "repo-automation[bot]"
            git config user.email "repo-automation[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore(ai): address Codex review findings"
            git push
          fi

      - name: Comment result
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment $PR_NUMBER --body-file .github/agent-output/summary.md