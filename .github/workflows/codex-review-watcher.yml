name: codex-review-watcher

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: codex-repair-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  maybe-repair:
    if: >
      (
        github.event_name == 'pull_request' ||
        github.event_name == 'pull_request_review' ||
        github.event_name == 'pull_request_review_comment' ||
        github.event_name == 'issue_comment'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Gather PR metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            PR_NUMBER="${{ github.event.issue.number }}"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi

          echo "PR_NUMBER=$PR_NUMBER" >> "$GITHUB_ENV"

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.head_ref }}
          fetch-depth: 0

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Prepare working directories
        run: |
          mkdir -p .github/agent-input
          mkdir -p .github/agent-output

      - name: Fetch reviews and comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews > reviews.json
          gh api repos/${{ github.repository }}/pulls/$PR_NUMBER/comments > review_comments.json
          gh api repos/${{ github.repository }}/issues/$PR_NUMBER/comments > issue_comments.json

      - name: Extract Codex fix requests
        run: |
          python .github/scripts/extract_codex_requests.py \
            --reviews reviews.json \
            --review-comments review_comments.json \
            --issue-comments issue_comments.json \
            --codex-actor "codex" \
            --out .github/agent-input/fix_requests.json

          cat .github/agent-input/fix_requests.json

      - name: Stop if nothing to fix
        run: |
          COUNT=$(jq '.requests | length' .github/agent-input/fix_requests.json)
          if [ "$COUNT" -eq 0 ]; then
            echo "No actionable Codex findings."
            exit 0
          fi

      - name: Enforce max iterations
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/enforce_iteration_limit.py \
            --repo ${{ github.repository }} \
            --pr $PR_NUMBER \
            --max-iterations 3

      - name: Run repair agent
        run: |
          codex exec "
          You are repairing PR #$PR_NUMBER in repo ${{ github.repository }}.
          Read .github/agent-input/fix_requests.json and fix only those issues.
          Run: make test
          Commit if needed with message: chore(ai): address Codex review findings
          Output JSON result to agent_result.json
          " || true

      - name: Commit and push changes
        run: |
          if ! git diff --quiet; then
            git config user.name "repo-automation[bot]"
            git config user.email "repo-automation[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore(ai): address Codex review findings"
            git push
          fi

      - name: Build summary
        run: |
          mkdir -p .github/agent-output

          if [ -f agent_result.json ]; then
            python .github/scripts/summarize_agent_result.py \
              --input agent_result.json \
              --output .github/agent-output/summary.md
          else
            cat > .github/agent-output/summary.md <<EOF
          ⚠️ **Automated repair finished**

          - **Status:** \`unknown\`
          - **Validation:** not reported

          No \`agent_result.json\` file was produced by the repair agent.
          EOF
          fi

          cat .github/agent-output/summary.md

      - name: Comment result
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s .github/agent-output/summary.md ]; then
            gh pr comment "$PR_NUMBER" --repo ${{ github.repository }} --body-file .github/agent-output/summary.md
          else
            echo "No summary file to post."
          fi