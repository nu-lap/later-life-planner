rules:
  - id: later-life-planner.javascript-hardcoded-db-uri
    languages:
      - javascript
      - typescript
    paths:
      include:
        - "**/*.js"
        - "**/*.jsx"
        - "**/*.ts"
        - "**/*.tsx"
    severity: ERROR
    message: Hardcoded database URI with embedded credentials.
    pattern-regex: '(?i)\b(?:const|let|var)\s+\w+\s*=\s*["''](?:postgres(?:ql)?|mysql|mongodb(?:\+srv)?|redis):\/\/[^"'']+["'']'

  - id: later-life-planner.javascript-string-built-sql-query
    languages:
      - javascript
      - typescript
    paths:
      include:
        - "**/*.js"
        - "**/*.jsx"
        - "**/*.ts"
        - "**/*.tsx"
    severity: ERROR
    message: SQL query is built with string interpolation instead of query parameters.
    pattern-regex: '(?is)(?:\.(?:query|execute)\s*\(\s*(?:`[^`]*\$\{[^`]+\}[^`]*`|["''][^"'']*["'']\s*\+|[^,\n)]+\+\s*["'']))|(?:(?:const|let|var)\s+\w+\s*=\s*(?:`[^`]*\$\{[^`]+\}[^`]*`|["''][^"'']*["'']\s*\+|[^=\n]+\+\s*["''][^"'']*["'']).{0,200}\.(?:query|execute)\(\s*\w+)'

  - id: later-life-planner.javascript-untrusted-filename-write
    languages:
      - javascript
      - typescript
    paths:
      include:
        - "**/*.js"
        - "**/*.jsx"
        - "**/*.ts"
        - "**/*.tsx"
    severity: ERROR
    message: User-controlled input is used in a filesystem path before writing.
    pattern-regex: '(?is)(?:process\.env|req\.(?:query|body|params)\.).{0,400}(?:path\.join\([^)]*`|(?:fs\.)?(?:writeFileSync|writeFile)\([^)]*path\.join\()'

  - id: later-life-planner.python-hardcoded-db-uri
    languages:
      - python
    severity: ERROR
    message: Hardcoded database URI with embedded credentials.
    pattern-regex: '(?i)\b\w+\s*=\s*["''](?:postgres(?:ql)?|mysql|mongodb(?:\+srv)?|redis):\/\/[^"'']+["'']'

  - id: later-life-planner.python-inline-string-built-sql-query
    languages:
      - python
    severity: ERROR
    message: SQL query is built with string interpolation instead of query parameters.
    pattern-regex: '(?is)\.\s*execute\(\s*(?:f["''][^"'']*["'']|["''][^"'']*["'']\s*%|["''][^"'']*["'']\.format\([^)]*\))'

  - id: later-life-planner.python-assigned-string-built-sql-query
    languages:
      - python
    severity: ERROR
    message: SQL query is built with string interpolation instead of query parameters.
    pattern-regex: '(?is)(?:query|sql)\s*=\s*(?:f["''][^"'']*["'']|["''][^"'']*["'']\s*%|["''][^"'']*["'']\.format\([^)]*\)).{0,200}\.execute\(\s*\w+'

  - id: later-life-planner.python-untrusted-filename-write
    languages:
      - python
    severity: ERROR
    message: User-controlled input is used in a filesystem path before writing.
    pattern-regex: '(?is)(?:os\.environ\.get|sys\.argv\[|input\().{0,400}(?:os\.path\.join\([^)]*f["'']|open\([^)]*f["''])'
